{{- range $key, $route := .Values.routes }}
{{- if $route.enabled }}
{{- $routeName := include "aws-alb-gateway.routeName" (dict "key" $key "route" $route) }}
{{- $gatewayKey := required (printf "routes.%s.gateway is required" $key) $route.gateway }}
{{- $gateway := index $.Values.gateways $gatewayKey }}
{{- $gatewayName := include "aws-alb-gateway.gatewayName" (dict "key" $gatewayKey "gateway" $gateway) }}
{{- $parentRefs := $route.parentRefs | default dict }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $routeName }}
  namespace: {{ required (printf "routes.%s.namespace is required" $key) $route.namespace }}
  labels:
    {{- include "aws-alb-gateway.labels" $ | nindent 4 }}
    app.kubernetes.io/component: http-route
    aws-alb-gateway.io/route-key: {{ $key | quote }}
    aws-alb-gateway.io/gateway-key: {{ $gatewayKey | quote }}
    {{- with $route.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge (dict) ($.Values.global.annotations | default dict) ($route.annotations | default dict) }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if $parentRefs.refs }}
    {{- toYaml $parentRefs.refs | nindent 4 }}
    {{- else }}
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gatewayName | quote }}
      {{- if ne $route.namespace $gateway.namespace }}
      namespace: {{ $gateway.namespace | quote }}
      {{- end }}
      {{- $sectionName := default $gateway.sectionName $parentRefs.sectionName }}
      {{- with $sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}
    {{- end }}
  {{- with $route.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- toYaml $route.rules | nindent 4 }}
{{- end }}
{{- end }}
